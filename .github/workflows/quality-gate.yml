name: quality-gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:manifest
      - run: npm run deps:map:check
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run audit:structure
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Run browser smoke suite
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 >/tmp/combat-ui-preview.log 2>&1 &
          PREVIEW_PID=$!
          cleanup() {
            if kill -0 "$PREVIEW_PID" 2>/dev/null; then
              kill "$PREVIEW_PID"
              wait "$PREVIEW_PID" || true
            fi
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173 >/dev/null
          SMOKE_URL=http://127.0.0.1:4173 npm run smoke:character-select
          SMOKE_URL=http://127.0.0.1:4173 npm run smoke:reward
          SMOKE_URL=http://127.0.0.1:4173 npm run smoke:combat-ui
      - run: npm run deps:map
      - name: Check dependency map delta thresholds
        if: github.event_name == 'pull_request'
        run: node scripts/check-dependency-delta-threshold.mjs --base-sha "${{ github.event.pull_request.base.sha }}"
      - name: Upload dependency map artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-map-${{ github.run_id }}
          path: |
            artifacts/dependency_map.json
            artifacts/dependency_map.md
      - name: Build dependency map PR summary
        if: github.event_name == 'pull_request'
        run: node scripts/ci/dependency-map-pr-summary.mjs --base-sha "${{ github.event.pull_request.base.sha }}" --output .github/depmap-summary.md
      - name: Comment dependency map PR summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- dependency-map-summary -->';
            const body = fs.readFileSync('.github/depmap-summary.md', 'utf8');
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
